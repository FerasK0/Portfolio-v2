backend:
  name: github
  repo: FerasK0/Portfolio-v2
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: projects
    label: المشاريع
    folder: src/content/projects
    create: true
    extension: json
    format: json
    preview_path: "/"
    fields:
      - label: العنوان
        name: title
        widget: string
      - label: السنة
        name: year
        widget: string
      - label: الوصف المختصر
        name: desc
        widget: text
      - label: المجال
        name: field
        widget: select
        options: [academic, tech, creative]
      - label: التاقات
        name: tags
        widget: list
      - label: رابط Vimeo
        name: vimeo
        widget: string
        required: false
      - label: ملخص
        name: summary
        widget: text
        required: false
      - label: المشكلة
        name: problem
        widget: markdown
        required: false
      - label: الحل
        name: solution
        widget: markdown
        required: false
      - label: النتيجة
        name: outcome
        widget: markdown
        required: false
      - label: صورة غلاف
        name: cover
        widget: image
        required: false
      - label: روابط
        name: links
        widget: list
        required: false
        fields:
          - { label: النص, name: label, widget: string }
          - { label: الرابط, name: url, widget: string }
      - label: منشور
        name: published
        widget: boolean
        default: true

  - name: posts
    label: المدونة
    folder: src/content/posts
    create: true
    extension: json
    format: json
    fields:
      - label: العنوان
        name: title
        widget: string
      - label: التاريخ
        name: date
        widget: datetime
      - label: المقتطف
        name: excerpt
        widget: text
      - label: المحتوى
        name: body
        widget: markdown
      - label: صورة غلاف
        name: cover
        widget: image
        required: false
      - label: التاقات
        name: tags
        widget: list
      - label: منشور
        name: published
        widget: boolean
        default: true